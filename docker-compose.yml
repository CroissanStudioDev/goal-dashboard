version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/goal_dashboard
      - CRON_SECRET=${CRON_SECRET:-your-secret-here}
      - TOCHKA_CLIENT_ID=${TOCHKA_CLIENT_ID:-}
      - TOCHKA_CLIENT_SECRET=${TOCHKA_CLIENT_SECRET:-}
      - TOCHKA_REDIRECT_URI=${TOCHKA_REDIRECT_URI:-http://localhost:3000/api/auth/tochka/callback}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=goal_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: run sync on schedule
  sync:
    build: .
    command: sh -c "while true; do sleep 900; wget -qO- --header='Authorization: Bearer $${CRON_SECRET}' http://app:3000/api/sync -X POST || true; done"
    environment:
      - CRON_SECRET=${CRON_SECRET:-your-secret-here}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
