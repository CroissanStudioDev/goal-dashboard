version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/goal_dashboard
      - TOCHKA_CLIENT_ID=${TOCHKA_CLIENT_ID:-}
      - TOCHKA_CLIENT_SECRET=${TOCHKA_CLIENT_SECRET:-}
      - TOCHKA_REDIRECT_URI=${TOCHKA_REDIRECT_URI:-http://localhost:3000/api/auth/tochka/callback}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=goal_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
